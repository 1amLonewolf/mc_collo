<!-- This SVG can be used as a placeholder OG image -->
<!-- To generate a PNG: Open generate-og.html in a browser and click the download button -->
<!-- Then save the downloaded PNG as og-image.png in the public/ folder -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle grid -->
  <g stroke="rgba(14, 165, 233, 0.03)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(0,0)"/>
  </g>
  
  <!-- Glowing orbs -->
  <circle cx="200" cy="150" r="300" fill="rgba(14, 165, 233, 0.15)"/>
  <circle cx="900" cy="450" r="250" fill="rgba(6, 182, 212, 0.12)"/>
  
  <!-- Center circle (logo) -->
  <circle cx="600" cy="200" r="70" fill="url(#logoGrad)"/>
  <text x="600" y="200" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">MC</text>
  
  <!-- Main title -->
  <text x="600" y="370" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">MC COLLO EVENTS</text>
  
  <!-- Subtitle -->
  <text x="600" y="430" font-family="Segoe UI, sans-serif" font-size="32" fill="#38bdf8" text-anchor="middle">Professional Master of Ceremonies</text>
  
  <!-- Decorative line -->
  <line x1="450" y1="460" x2="750" y2="460" stroke="#0ea5e9" stroke-width="2"/>
  
  <!-- Bottom text -->
  <text x="600" y="500" font-family="Segoe UI, sans-serif" font-size="24" fill="#64748b" text-anchor="middle">Weddings • Corporate • Galas • Conferences</text>
  
  <!-- Website -->
  <text x="600" y="550" font-family="Segoe UI, sans-serif" font-size="20" fill="#38bdf8" text-anchor="middle">mccolloevents.com</text>
  
  <!-- Corner accents -->
  <g stroke="rgba(14, 165, 233, 0.3)" stroke-width="3" fill="none">
    <path d="M 40 80 L 40 40 L 80 40"/>
    <path d="M 1120 80 L 1160 40 L 1160 80"/>
    <path d="M 40 550 L 40 590 L 80 590"/>
    <path d="M 1120 550 L 1160 590 L 1160 550"/>
  </g>
</svg>
