<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="wolfCircle">
      <circle cx="20" cy="20" r="18" />
    </clipPath>
  </defs>
  <!-- White circle background with border -->
  <circle cx="20" cy="20" r="18" fill="white" stroke="#6366F1" stroke-width="1.5">
    <animate attributeName="stroke" values="#6366F1;#8B5CF6;#A78BFA;#6366F1" dur="3s" repeatCount="indefinite" />
  </circle>
  <!-- Wolf image clipped to circle -->
  <image href="/icons/wolf.png" x="8" y="6" width="24" height="28" clip-path="url(#wolfCircle)" />
</svg>
