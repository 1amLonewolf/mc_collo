<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OG Image Generator - MC COLLO</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            font-family: 'Segoe UI', sans-serif;
        }
        h1 { color: #e2e8f0; font-size: 18px; margin-bottom: 0; }
        p { color: #64748b; font-size: 14px; margin: 0; }
        #downloadBtn {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        #downloadBtn:hover { background: #0284c7; }
    </style>
</head>
<body>
    <h1>🎨 MC COLLO OG Image Generator</h1>
    <p>Click the button below to download the image, then save it as <code style="background:#1e293b;padding:2px 6px;border-radius:4px;">public/og-image.png</code></p>
    <button id="downloadBtn">📥 Download OG Image</button>
    
    <script>
        const canvas = document.createElement('canvas');
        canvas.width = 1200;
        canvas.height = 630;
        const ctx = canvas.getContext('2d');

        // Background gradient
        const gradient = ctx.createLinearGradient(0, 0, 1200, 630);
        gradient.addColorStop(0, '#0f172a');
        gradient.addColorStop(0.5, '#1e293b');
        gradient.addColorStop(1, '#0c4a6e');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1200, 630);

        // Subtle grid pattern
        ctx.strokeStyle = 'rgba(14, 165, 233, 0.03)';
        ctx.lineWidth = 1;
        for (let x = 0; x < 1200; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, 630);
            ctx.stroke();
        }
        for (let y = 0; y < 630; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(1200, y);
            ctx.stroke();
        }

        // Glowing orbs
        const orb1 = ctx.createRadialGradient(200, 150, 0, 200, 150, 300);
        orb1.addColorStop(0, 'rgba(14, 165, 233, 0.15)');
        orb1.addColorStop(1, 'rgba(14, 165, 233, 0)');
        ctx.fillStyle = orb1;
        ctx.fillRect(0, 0, 600, 400);

        const orb2 = ctx.createRadialGradient(900, 450, 0, 900, 450, 250);
        orb2.addColorStop(0, 'rgba(6, 182, 212, 0.12)');
        orb2.addColorStop(1, 'rgba(6, 182, 212, 0)');
        ctx.fillStyle = orb2;
        ctx.fillRect(600, 200, 600, 500);

        // Center circle (logo placeholder)
        ctx.beginPath();
        ctx.arc(600, 200, 70, 0, Math.PI * 2);
        const logoGrad = ctx.createLinearGradient(530, 130, 670, 270);
        logoGrad.addColorStop(0, '#0ea5e9');
        logoGrad.addColorStop(1, '#06b6d4');
        ctx.fillStyle = logoGrad;
        ctx.fill();

        // "MC" text in circle
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 64px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('MC', 600, 200);

        // Main title
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 72px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.fillText('MC COLLO EVENTS', 600, 370);

        // Subtitle
        ctx.fillStyle = '#38bdf8';
        ctx.font = '32px "Segoe UI", sans-serif';
        ctx.fillText('Professional Master of Ceremonies', 600, 430);

        // Decorative line
        ctx.strokeStyle = '#0ea5e9';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(450, 460);
        ctx.lineTo(750, 460);
        ctx.stroke();

        // Bottom text
        ctx.fillStyle = '#64748b';
        ctx.font = '24px "Segoe UI", sans-serif';
        ctx.fillText('Weddings • Corporate • Galas • Conferences', 600, 500);

        // Website URL
        ctx.fillStyle = '#38bdf8';
        ctx.font = '20px "Segoe UI", sans-serif';
        ctx.fillText('mccollo.com', 600, 550);

        // Corner accents
        ctx.strokeStyle = 'rgba(14, 165, 233, 0.3)';
        ctx.lineWidth = 3;
        // Top-left
        ctx.beginPath(); ctx.moveTo(40, 80); ctx.lineTo(40, 40); ctx.lineTo(80, 40); ctx.stroke();
        // Top-right
        ctx.beginPath(); ctx.moveTo(1120, 80); ctx.lineTo(1160, 40); ctx.lineTo(1160, 80); ctx.stroke();
        // Bottom-left
        ctx.beginPath(); ctx.moveTo(40, 550); ctx.lineTo(40, 590); ctx.lineTo(80, 590); ctx.stroke();
        // Bottom-right
        ctx.beginPath(); ctx.moveTo(1120, 550); ctx.lineTo(1160, 590); ctx.lineTo(1160, 550); ctx.stroke();

        // Download handler
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'og-image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Also append canvas so it's visible
        canvas.style.cssText = 'border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-width: 100%;';
        document.body.appendChild(canvas);
    </script>
</body>
</html>
